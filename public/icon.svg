<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#2d5a8e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38b2ac"/>
      <stop offset="100%" style="stop-color:#4fd1c5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Bone stylized (simplified femur/long bone) -->
  <g transform="translate(256,256) rotate(-30)">
    <!-- Bone shaft -->
    <rect x="-16" y="-100" width="32" height="200" rx="10" fill="white" opacity="0.9"/>
    <!-- Proximal epiphysis -->
    <circle cx="-18" cy="-108" r="22" fill="white" opacity="0.9"/>
    <circle cx="18" cy="-108" r="22" fill="white" opacity="0.9"/>
    <!-- Distal epiphysis -->
    <circle cx="-18" cy="108" r="22" fill="white" opacity="0.9"/>
    <circle cx="18" cy="108" r="22" fill="white" opacity="0.9"/>
  </g>
  <!-- Curved arrow indicating rehabilitation/recovery (wrapping around the bone) -->
  <g transform="translate(256,256)">
    <path d="M 70,-80 A 110,110 0 0,1 80,80" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="80,80 62,60 96,64" fill="url(#accent)"/>
    <!-- Small progress dots -->
    <circle cx="72" cy="-50" r="5" fill="#4fd1c5" opacity="0.6"/>
    <circle cx="82" cy="-15" r="5" fill="#4fd1c5" opacity="0.7"/>
    <circle cx="84" cy="20" r="5" fill="#4fd1c5" opacity="0.8"/>
    <circle cx="84" cy="55" r="5" fill="#4fd1c5" opacity="0.9"/>
  </g>
</svg>
